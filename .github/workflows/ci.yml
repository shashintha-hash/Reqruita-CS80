name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  desktop-app-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reqruita-desktop-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reqruita-desktop-app/package-lock.json
      - name: Install Dependencies
        run: npm install
      - name: Run Build
        run: npm run build
